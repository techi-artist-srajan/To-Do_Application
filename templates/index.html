{% extends 'base.html' %}
{% block title %} Home {% endblock title %}
{% block body %}

    <div class="container my-3">
        <h2>Add Your Todo's</h2>
        <form id="todo-form">
            <div class="mb-3">
                <label for="title" class="form-label">Todo Title</label>
                <input type="text" class="form-control" name="title" id="title">
            </div>
            <div class="mb-3">
                <label for="desc" class="form-label">Todo Description</label>
                <input type="text" class="form-control" name="description" id="desc">
            </div>
            <button type="submit" class="btn btn-info">Submit</button>
        </form>
    </div>
    <div class="container my-3">
        <h2>Your Todo</h2>

        <script>

        const form = document.getElementById("todo-form")

        form.addEventListener("submit", function(event){

            event.preventDefault()

            const title = document.getElementById("title").value
            const description = document.getElementById("desc").value

            fetch("/todo", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    todo: title,
                    description: description
                })

            })
            .then(response => response.json())
            .then(data => {

                // alert("Todo added successfully")

                location.reload()

            })

        })

        </script>
        
        <style>
            .table tbody tr:hover td, table tbody tr:hover th{
                border-top: .09rem solid rgb(175, 175, 175);
                border-bottom: .09rem solid rgb(175, 175, 175);
            }
            .table tbody td {
                vertical-align: middle;
            }
        </style>
        <table class="table">

            <thead>
                <tr>
                    <th>S No</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="todo-table">
            </tbody>
            </thead>

            <script>

            fetch("/todo")
            .then(response => response.json())
            .then(data => {

                const table = document.getElementById("todo-table")

                if(data.length === 0){
                    table.innerHTML = `
                    <tr>
                    <td colspan="5">No pending tasks. Add to create tasks.</td>
                    </tr>`
                    return
                }

                data.forEach((todo, index) => {

                    const row = `
                    <tr>
                    <th>${index+1}</th>
                    <td>${todo.title}</td>
                    <td>${todo.description}</td>
                    <td>${todo.date_created}</td>
                    <td style="text-align:center;">
                        <a href="/update/${todo.sno}" class="btn btn-outline-info btn-sm">Update</a>
                        <a href="/delete/${todo.sno}" class="btn btn-outline-info btn-sm">Delete</a>
                    </td>
                    </tr>
                    `

                    table.innerHTML += row

                })

            })

            </script>
