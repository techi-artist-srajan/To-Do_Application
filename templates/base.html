<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} {% endblock title %} Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<style>
    html, body{
        height:100%;
        margin:0;
    }
    body{
        display:flex;
        flex-direction:column;
    }
    main, .container-fluid, .content-wrapper {
        flex: 1 0 auto; /* This tells the middle content to GROW and fill space */
    }
    footer{
        flex-shrink:0;
    }
</style>
<body>
    <main>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><strong>Task</strong>Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="{{ url_for('pages.home') }}" style="color:rgb(13, 186, 230); font-weight:600">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="/update">MyTodo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="/update">How to?</a>
                </li>
            </ul>
            {% block nav %}
            
            {% endblock nav %}
            
            <!-- <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                <button class="btn btn-outline-info" type="submit">Search</button>
            </form> -->
        </div>
    </div>
</nav>
    {% block body %}
        
    {% endblock body %}
</main>
    {% block footer %}
    <p style="text-align:center; background-color:rgb(155, 228, 248); padding:.1rem;">Developed By: Srajankumar Angadi</p>
    {% endblock footer %}

</body>
</html>
