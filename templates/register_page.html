{% extends 'base.html' %}
{% block title %} Register {% endblock title %}
{% block body %}

    <style>
        .login-form{
            display: flex;
            /* flex-direction: column; */
            justify-content:center;
            align-items: center;
            
            border: .1rem solid rgb(235, 250, 255);
            box-shadow: .2rem .2rem .2rem rgb(60, 83, 97);
            width: 40%;
            padding: 1rem;
            margin: auto;
            margin-top: 5rem;
            border-radius: .4rem;
            background-color: rgba(0, 183, 255, 0.05);
        }
        .login-form form{
            width:80%;
        }
    </style>
    <div class="container">
    <div class="login-form">
        <form>
            <h3 style="text-align:center; margin:1.5rem;"><strong>Task</strong>Manager</h3>
            <div class="mb-3">
                <label for="InputUser" class="form-label">Username:</label>
                <input type="text" class="form-control" name="username">
            </div>
            <div class="mb-3">
                <label for="InputPassword1" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password">
            </div>
            <div class="mb-3">
                <label for="InputPassword1" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password">
            </div>
            <small id="message" style="margin:auto;"></small>
            <div class="text-center">
                <button type="submit" class="btn btn-primary" style="width:40%;">Register</button>
            </div>
        </form>
    </div>
    </div>

    <script>
// form submission
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.querySelector("[name='username']").value;
    const password = document.querySelector("[name='password']").value;
    const confirmPassword = document.querySelector("[name='confirm_password']").value;
    const messageBox = document.getElementById("message");

    // Basic validation
    if (password !== confirmPassword) {
        messageBox.innerText = "Passwords do not match";
        messageBox.style.color = "red";
        return;
    }

    try {
        const response = await fetch("/api/users", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            messageBox.innerText = data.message || "Username Exists";
            messageBox.style.color = "red";
            return;
        }

        messageBox.innerText = "Registration successful!";
        messageBox.style.color = "green";

        window.location.href = "/todos";

    } catch (error) {
        console.error(error);
        messageBox.innerText = "Something went wrong!";
        messageBox.style.color = "red";
    }
});
</script>

        {% endblock body %}
